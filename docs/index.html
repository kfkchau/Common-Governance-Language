function programmaticZoomTo(transform, animate = true) {
  isProgrammaticZoom = true;
  if (programmaticZoomReleaseTimer) window.clearTimeout(programmaticZoomReleaseTimer);
  const zoomTarget = animate ? svg.transition().duration(uiState.compact ? 360 : 720) : svg;
  zoomTarget.call(zoom.transform, transform);
  programmaticZoomReleaseTimer = window.setTimeout(() => {
    isProgrammaticZoom = false;
  }, animate ? 760 : 40);
}

function fitGraphToViewport(animate = true, force = false) {
  if (uiState.userAdjustedZoom && !force) return;
  const positionedNodes = nodes.filter(nodeDatum => Number.isFinite(nodeDatum.x) && Number.isFinite(nodeDatum.y));
  if (!positionedNodes.length) return;

  let minX = Number.POSITIVE_INFINITY;
  let maxX = Number.NEGATIVE_INFINITY;
  let minY = Number.POSITIVE_INFINITY;
  let maxY = Number.NEGATIVE_INFINITY;

  positionedNodes.forEach(nodeDatum => {
    const radius = getRadius(nodeDatum) + (uiState.compact ? 14 : 20);
    minX = Math.min(minX, nodeDatum.x - radius);
    maxX = Math.max(maxX, nodeDatum.x + radius);
    minY = Math.min(minY, nodeDatum.y - radius);
    maxY = Math.max(maxY, nodeDatum.y + radius);
  });

  const padding = getViewportPadding();
  const usableWidth = Math.max(160, width - padding.left - padding.right);
  const usableHeight = Math.max(160, height - padding.top - padding.bottom);
  const boundsWidth = Math.max(80, maxX - minX);
  const boundsHeight = Math.max(80, maxY - minY);
  const scale = Math.max(
    uiState.compact ? 0.42 : 0.32,
    Math.min(
      uiState.compact ? 1.2 : 1.55,
      0.92 * Math.min(usableWidth / boundsWidth, usableHeight / boundsHeight)
    )
  );
  const graphCenterX = (minX + maxX) / 2;
  const graphCenterY = (minY + maxY) / 2;
  const viewportCenterX = padding.left + usableWidth / 2;
  const viewportCenterY = padding.top + usableHeight / 2;
  const transform = d3.zoomIdentity
    .translate(viewportCenterX - graphCenterX * scale, viewportCenterY - graphCenterY * scale)
    .scale(scale);

  programmaticZoomTo(transform, animate);
  uiState.hasAutoFitted = true;
}

function scheduleSmartFit(animate = false, force = false, delay = uiState.compact ? 180 : 360) {
  if (uiState.userAdjustedZoom && !force) return;
  if (uiState.smartFitTimer) window.clearTimeout(uiState.smartFitTimer);
  uiState.smartFitTimer = window.setTimeout(() => {
    fitGraphToViewport(animate, force);
  }, delay);
}

function applyResponsiveUI(force = false) {
  const compactNext = window.innerWidth <= compactUiBreakpoint || window.innerHeight <= compactUiHeightBreakpoint;
  if (!force && compactNext === uiState.compact) {
    syncViewportSize();
    return;
  }

  uiState.compact = compactNext;
  uiState.userAdjustedZoom = false;
  document.body.classList.toggle("compact-ui", compactNext);
  syncViewportSize();

  if (compactNext && !uiState.compactPanelsApplied) {
    panelState.legend = false;
    panelState.stats = false;
    panelState.title = false;
    panelState.search = true;
    uiState.compactPanelsApplied = true;
    syncPanelVisibility();
  }

  if (!compactNext && !uiState.desktopPanelsApplied) {
    panelState.legend = true;
    panelState.stats = true;
    panelState.title = true;
    panelState.search = true;
    uiState.desktopPanelsApplied = true;
    syncPanelVisibility();
  }
}

function extractPathTrail(link) {
  const reading = link.reading || "";
  const match = reading.match(/path:\s*(.*)$/i);
  const trail = match ? match[1].trim() : `${getLinkId(link.source)} -> ${getLinkId(link.target)}`;
  const nodesInTrail = trail
    .split(/\s+(?:->|<-)\s+/)
    .map(part => part.trim())
    .filter(Boolean);
  return {
    trail,
    nodes: nodesInTrail.length ? nodesInTrail : [getLinkId(link.source), getLinkId(link.target)]
  };
}

function getLinkChainLength(link) {
  const reading = link.reading || "";
  const textMatch = reading.match(/path of length\s+(\d+)/i);
  if (textMatch) return Number(textMatch[1]);
  const tokenMatch = reading.match(/PATH(\d+)/i);
  if (tokenMatch) return Number(tokenMatch[1]);
  const trail = extractPathTrail(link);
  return Math.max(1, trail.nodes.length - 1);
}

const baseAdjacency = new Map();
const directLinkSet = new Set();
links.forEach(linkDatum => {
  if (getLinkChainLength(linkDatum) !== 1) return;
  directLinkSet.add(linkDatum);
  const sourceId = getLinkId(linkDatum.source);
  const targetId = getLinkId(linkDatum.target);
  if (!baseAdjacency.has(sourceId)) baseAdjacency.set(sourceId, []);
  if (!baseAdjacency.has(targetId)) baseAdjacency.set(targetId, []);
  baseAdjacency.get(sourceId).push({ node: targetId, link: linkDatum });
  baseAdjacency.get(targetId).push({ node: sourceId, link: linkDatum });
});

function updateStats() {
  if (statsBig[0]) statsBig[0].textContent = String(nodes.length);
  if (statsBig[1]) statsBig[1].textContent = String(links.length);
}

function updateArrowVisibility() {
  link.attr("marker-end", d => searchState.showArrows && d.v2 === "NS" ? `url(#arrow-${d.v2})` : null);
  if (arrowToggleBtn) {
    arrowToggleBtn.textContent = searchState.showArrows ? "arrows on" : "arrows off";
    arrowToggleBtn.classList.toggle("active", searchState.showArrows);
  }
}

function updateOrbitToggle() {
  if (!orbitToggleBtn) return;
  orbitToggleBtn.textContent = searchState.orbitMode ? "orbit on" : "orbit off";
  orbitToggleBtn.classList.toggle("active", searchState.orbitMode);
}

function getSelectionEntry(nodeId) {
  return searchState.selectedItems.find(item => item.id === nodeId) || null;
}

function getSelectionColor(nodeId, fallback) {
  const entry = getSelectionEntry(nodeId);
  return entry ? entry.color : fallback;
}

function getNeighborhoodDistances(startId, maxDepth) {
  const distances = new Map();
  if (!startId || !baseAdjacency.has(startId)) {
    if (startId) distances.set(startId, 0);
    return distances;
  }

  const queue = [{ node: startId, depth: 0 }];
  distances.set(startId, 0);

  while (queue.length) {
    const current = queue.shift();
    if (current.depth >= maxDepth) continue;
    (baseAdjacency.get(current.node) || []).forEach(edge => {
      if (distances.has(edge.node)) return;
      const nextDepth = current.depth + 1;
      distances.set(edge.node, nextDepth);
      queue.push({ node: edge.node, depth: nextDepth });
    });
  }

  return distances;
}

function getNeighborhoodStrength(distance, maxDepth) {
  if (distance > maxDepth) return 0;
  const raw = 1 - (distance / (maxDepth + 1));
  return Math.max(0.18, raw);
}

function hexToRgb(hex) {
  const normalized = hex.replace("#", "");
  const safe = normalized.length === 3
    ? normalized.split("").map(ch => ch + ch).join("")
    : normalized;
  const int = Number.parseInt(safe, 16);
  return {
    r: (int >> 16) & 255,
    g: (int >> 8) & 255,
    b: int & 255
  };
}

function rgbToCss(rgb) {
  return `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
}

function mixHex(colorA, colorB, ratio) {
  const a = hexToRgb(colorA);
  const b = hexToRgb(colorB);
  const mix = {
    r: Math.round(a.r + (b.r - a.r) * ratio),
    g: Math.round(a.g + (b.g - a.g) * ratio),
    b: Math.round(a.b + (b.b - a.b) * ratio)
  };
  return rgbToCss(mix);
}

function getDistanceColor(baseColor, distance) {
  if (distance <= 0) return baseColor;
  if (distance === 1) return mixHex(baseColor, "#f8fafc", 0.18);
  if (distance === 2) return mixHex(baseColor, "#cbd5e1", 0.42);
  return mixHex(baseColor, "#94a3b8", 0.62);
}

function getOrbitCenterId() {
  if (activeFilter && activeFilter.type === "node") return activeFilter.value;
  if (searchState.selectedItems.length === 1) return searchState.selectedItems[0].id;
  if (searchState.pair.a) return searchState.pair.a;
  return null;
}

function clearOrbitLayout(restart = true) {
  let changed = false;
  nodes.forEach(nodeDatum => {
    if (nodeDatum._orbitLocked || nodeDatum.fx != null || nodeDatum.fy != null) {
      nodeDatum.fx = null;
      nodeDatum.fy = null;
      nodeDatum._orbitLocked = false;
      changed = true;
    }
  });
  layoutState.orbitCenterId = null;
  if (changed && restart) simulation.alpha(0.35).restart();
}

function applyOrbitLayout(centerId, maxDepth = focusNeighborhoodMaxDepth) {
  if (!centerId || !baseAdjacency.has(centerId)) {
    clearOrbitLayout();
    return;
  }

  const distances = getNeighborhoodDistances(centerId, maxDepth);
  const rings = Array.from({ length: maxDepth + 1 }, () => []);
  distances.forEach((distance, nodeId) => {
    if (distance <= maxDepth) rings[distance].push(nodeId);
  });
  rings.forEach(ring => ring.sort());

  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight / 2;
  const radiusByDepth = [0, 120, 235, 350];
  let changed = layoutState.orbitCenterId !== centerId;

  nodes.forEach(nodeDatum => {
    const distance = distances.get(nodeDatum.id);
    if (distance === undefined || distance > maxDepth) {
      if (nodeDatum._orbitLocked) {
        nodeDatum.fx = null;
        nodeDatum.fy = null;
        nodeDatum._orbitLocked = false;
        changed = true;
      }
      return;
    }

    let targetX = centerX;
    let targetY = centerY;

    if (distance > 0) {
      const ring = rings[distance];
      const index = Math.max(0, ring.indexOf(nodeDatum.id));
      const angle = (-Math.PI / 2) + ((Math.PI * 2 * index) / Math.max(ring.length, 1));
      const radius = radiusByDepth[distance] || (110 + distance * 110);
      targetX = centerX + Math.cos(angle) * radius;
      targetY = centerY + Math.sin(angle) * radius;
    }

    if (!nodeDatum._orbitLocked || Math.abs((nodeDatum.fx ?? 0) - targetX) > 1 || Math.abs((nodeDatum.fy ?? 0) - targetY) > 1) {
      changed = true;
    }

    nodeDatum.fx = targetX;
    nodeDatum.fy = targetY;
    nodeDatum._orbitLocked = true;
  });

  layoutState.orbitCenterId = centerId;
  if (changed) simulation.alpha(0.65).restart();
}

function getFocusSources() {
  const sources = new Map();

  if (activeFilter && activeFilter.type === "node") {
    sources.set(activeFilter.value, {
      id: activeFilter.value,
      color: getSelectionColor(activeFilter.value, "#f59e0b")
    });
  }

  searchState.selectedItems.forEach(item => {
    sources.set(item.id, { id: item.id, color: item.color });
  });

  return [...sources.values()];
}

function buildNeighborhoodAssignments(maxDepth = focusNeighborhoodMaxDepth) {
  const nodeAssignments = new Map();
  const linkAssignments = new Map();
  const focusSources = getFocusSources();

  focusSources.forEach(source => {
    const distances = getNeighborhoodDistances(source.id, maxDepth);
    distances.forEach((distance, nodeId) => {
      const intensity = getNeighborhoodStrength(distance, maxDepth);
      const existing = nodeAssignments.get(nodeId);
      if (!existing || intensity > existing.intensity) {
        nodeAssignments.set(nodeId, {
          color: source.color,
          intensity,
          distance,
          sourceId: source.id
        });
      }
    });

    links.forEach(linkDatum => {
      if (!directLinkSet.has(linkDatum)) return;
      const sourceDistance = distances.get(getLinkId(linkDatum.source));
      const targetDistance = distances.get(getLinkId(linkDatum.target));
      const edgeDistance = Math.min(
        sourceDistance === undefined ? Number.POSITIVE_INFINITY : sourceDistance,
        targetDistance === undefined ? Number.POSITIVE_INFINITY : targetDistance
      );
      if (!Number.isFinite(edgeDistance) || edgeDistance > maxDepth) return;

      const intensity = getNeighborhoodStrength(edgeDistance + 0.5, maxDepth);
      const existing = linkAssignments.get(linkDatum);
      if (!existing || intensity > existing.intensity) {
        linkAssignments.set(linkDatum, {
          color: source.color,
          intensity,
          distance: edgeDistance,
          sourceId: source.id
        });
      }
    });
  });

  return { nodeAssignments, linkAssignments };
}

function ensureValidPair() {
  const ids = searchState.selectedItems.map(item => item.id);
  if (!ids.includes(searchState.pair.a)) searchState.pair.a = ids[0] || null;
  if (!ids.includes(searchState.pair.b)) searchState.pair.b = ids.find(id => id !== searchState.pair.a) || null;
  if (searchState.pair.a && searchState.pair.a === searchState.pair.b) {
    searchState.pair.b = ids.find(id => id !== searchState.pair.a) || null;
  }
}

function renderSearchSelection() {
  if (!searchSelection) return;
  if (!searchState.selectedItems.length) {
    searchSelection.innerHTML = "";
    return;
  }

  searchSelection.innerHTML = searchState.selectedItems.map(item => `
    <div class="search-chip">
      <span class="search-chip-dot" style="background:${item.color}"></span>
      <span class="search-chip-name" title="${item.label}">${item.label}</span>
      <span class="search-chip-actions">
        <button class="search-chip-role ${searchState.pair.a === item.id ? 'active' : ''}" type="button" data-role="a" data-id="${item.id}">A</button>
        <button class="search-chip-role ${searchState.pair.b === item.id ? 'active' : ''}" type="button" data-role="b" data-id="${item.id}">B</button>
        <button class="search-chip-remove" type="button" data-remove-id="${item.id}">&times;</button>
      </span>
    </div>
  `).join("");

  searchSelection.querySelectorAll("[data-role]").forEach(btn => {
    btn.addEventListener("click", () => {
      searchState.pair[btn.dataset.role] = btn.dataset.id;
      ensureValidPair();
      renderSearchSelection();
      refreshRelationshipState();
    });
  });

  searchSelection.querySelectorAll("[data-remove-id]").forEach(btn => {
    btn.addEventListener("click", () => {
      searchState.selectedItems = searchState.selectedItems.filter(item => item.id !== btn.dataset.removeId);
      ensureValidPair();
      renderSearchSelection();
      refreshRelationshipState();
    });
  });
}

function addSelectedNode(nodeId) {
  if (!nodeById.has(nodeId)) return;
  if (searchState.selectedItems.some(item => item.id === nodeId)) return;
  if (searchState.selectedItems.length >= 5) return;

  const nodeDatum = nodeById.get(nodeId);
  searchState.selectedItems.push({
    id: nodeDatum.id,
    label: nodeDatum.id,
    color: selectionPalette[searchState.selectedItems.length % selectionPalette.length]
  });
  ensureValidPair();
  renderSearchSelection();
  refreshRelationshipState();
}

function addHighlightedResult() {
  const flat = searchDropdown._flat || [];
  const candidate = selectedIdx >= 0 ? flat[selectedIdx] : flat[0];
  if (candidate && candidate.type === "entity") addSelectedNode(candidate.id);
}

function buildSearchItems() {
  searchItems.length = 0;
  nodes.forEach(n => {
    searchItems.push({
      type: "entity",
      id: n.id,
      label: n.id,
      sub: n.group,
      match: `${n.id} ${n.group}`.toLowerCase(),
      action: () => applyNodeFilter(n.id)
    });
  });

  Object.entries(v2Labels).forEach(([key, label]) => {
    searchItems.push({
      type: "geometry",
      id: key,
      label: `${key} - ${label}`,
      sub: `${v2Counts[key] || 0} links`,
      match: `${key} ${label}`.toLowerCase(),
      action: () => applyV2Filter(key)
    });
  });

  const allFrames = [...new Set(links.map(l => l.frame))].sort();
  allFrames.forEach(frame => {
    const count = links.filter(l => l.frame === frame).length;
    searchItems.push({
      type: "frame",
      id: frame,
      label: frame,
      sub: `${count} links`,
      match: frame.toLowerCase(),
      action: () => applyFrameFilter(frame)
    });
  });
}

function getSearchMatches(query) {
  if (!query) return [];
  return searchItems.filter(item => item.match.includes(query));
}

function renderSearchDropdown(matches) {
  if (!matches.length) {
    searchDropdown.innerHTML = '<div class="search-empty">No matches</div>';
    searchDropdown.classList.add("visible");
    searchDropdown._flat = [];
    selectedIdx = -1;
    return;
  }

  const grouped = {};
  matches.forEach(match => {
    if (!grouped[match.type]) grouped[match.type] = [];
    grouped[match.type].push(match);
  });

  const typeLabels = { entity: "ENTITIES", geometry: "GEOMETRY", frame: "FRAMES" };
  const flat = [];
  let html = "";

  ["entity", "geometry", "frame"].forEach(type => {
    if (!grouped[type]) return;
    html += `<div class="search-category">${typeLabels[type]}</div>`;
    grouped[type].forEach(item => {
      const idx = flat.length;
      const canAdd = item.type === "entity" && !searchState.selectedItems.some(sel => sel.id === item.id) && searchState.selectedItems.length < 5;
      html += `<div class="search-result" data-idx="${idx}">
        <div class="search-result-main">
          <span class="search-result-label">${item.label}</span>
          <span class="search-result-sub">${item.sub}</span>
        </div>
        <button class="search-result-add" type="button" data-add-idx="${idx}" ${canAdd ? "" : "disabled"}>+</button>
      </div>`;
      flat.push(item);
    });
  });

  searchDropdown._flat = flat;
  searchDropdown.innerHTML = html;
  searchDropdown.classList.add("visible");
  selectedIdx = -1;

  searchDropdown.querySelectorAll(".search-result").forEach(el => {
    el.addEventListener("mousedown", (e) => {
      if (e.target.closest("[data-add-idx]")) return;
      e.preventDefault();
      const item = flat[Number(el.dataset.idx)];
      item.action();
      searchInput.value = item.label;
      searchClear.style.display = "block";
      searchDropdown.classList.remove("visible");
    });
  });

  searchDropdown.querySelectorAll("[data-add-idx]").forEach(btn => {
    btn.addEventListener("mousedown", e => e.preventDefault());
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const item = flat[Number(btn.dataset.addIdx)];
      if (item.type === "entity") addSelectedNode(item.id);
      renderSearchDropdown(getSearchMatches(searchInput.value.toLowerCase().trim()));
    });
  });
}

function hlSearchResult() {
  searchDropdown.querySelectorAll(".search-result").forEach((el, i) => {
    el.classList.toggle("highlighted", i === selectedIdx);
    if (i === selectedIdx) el.scrollIntoView({ block: "nearest" });
  });
}

function buildPathSummary(pathResult) {
  if (!pathResult) {
    return '<div class="path-panel-empty">Select at least two added nodes and assign them as A and B to compare their shortest relationship chain.</div>';
  }

  if (!pathResult.found) {
    return `
      <div class="path-panel-header">
        <div class="path-panel-title">Shortest Path</div>
        <div class="path-panel-sub">No chain within ${pathResult.maxDepth}</div>
      </div>
      <div class="path-panel-empty">No actual path from ${pathResult.start} to ${pathResult.end} was found within ${pathResult.maxDepth} chain step${pathResult.maxDepth === 1 ? "" : "s"}.</div>
    `;
  }

  return `
    <div class="path-panel-header">
      <div class="path-panel-title">Shortest Path</div>
      <div class="path-panel-sub">${pathResult.chainLength} chain step${pathResult.chainLength === 1 ? "" : "s"}</div>
    </div>
    <div class="path-panel-scroll">
      <div class="path-pill-row">
        ${pathResult.nodes.map(nodeId => `<span class="path-pill">${nodeId}</span>`).join("")}
      </div>
      <div class="path-sequence">
        ${pathResult.steps.map((step, idx) => `
          <div class="path-step">
            <div class="path-step-main">
              <span class="path-step-index">${idx + 1}</span>
              <span class="path-step-label">${step.from} -> ${step.to}</span>
            </div>
            <div class="path-step-meta">${step.link.v2} | ${step.link.frame}</div>
            <div class="path-step-trail">${extractPathTrail(step.link).trail}</div>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function renderPathPanel() {
  if (!pathPanel) return;
  const pairA = searchState.pair.a;
  const pairB = searchState.pair.b;

  if (!pairA || !pairB) {
    pathPanel.innerHTML = `
      <div class="path-panel-header">
        <div class="path-panel-title">Shortest Path</div>
        <div class="path-panel-sub">Awaiting A and B</div>
      </div>
      <div class="path-panel-empty">Add up to five nodes, then tag any two chips as A and B. The panel will show the shortest actual chain between them up to the chosen depth.</div>
    `;
    return;
  }

  pathPanel.innerHTML = buildPathSummary(searchState.path);
}

function findShortestChainPath(startId, endId, maxDepth) {
  if (!baseAdjacency.has(startId) || !baseAdjacency.has(endId)) {
    return { found: false, start: startId, end: endId, maxDepth };
  }

  const queue = [{ node: startId, nodes: [startId], steps: [] }];
  const bestDepthByNode = new Map([[startId, 0]]);

  while (queue.length) {
    const current = queue.shift();
    if (current.node === endId) {
      return {
        found: true,
        start: startId,
        end: endId,
        maxDepth,
        chainLength: current.steps.length,
        nodes: current.nodes,
        steps: current.steps
      };
    }

    const nextDepth = current.steps.length + 1;
    if (nextDepth > maxDepth) continue;

    (baseAdjacency.get(current.node) || []).forEach(edge => {
      const knownDepth = bestDepthByNode.get(edge.node);
      if (knownDepth !== undefined && knownDepth <= nextDepth) return;
      bestDepthByNode.set(edge.node, nextDepth);
      queue.push({
        node: edge.node,
        nodes: [...current.nodes, edge.node],
        steps: [...current.steps, { from: current.node, to: edge.node, link: edge.link }]
      });
    });
  }

  return { found: false, start: startId, end: endId, maxDepth };
}

function refreshRelationshipState() {
  ensureValidPair();
  const pairA = searchState.pair.a;
  const pairB = searchState.pair.b;
  const maxDepth = Math.max(1, Math.min(7, Number(pathDepthInput.value) || 1));
  pathDepthInput.value = String(maxDepth);
  searchState.path = pairA && pairB ? findShortestChainPath(pairA, pairB, maxDepth) : null;
  renderSearchSelection();
  renderPathPanel();
  renderGraphState();
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll(".legend-item").forEach(item => item.classList.remove("dimmed", "active"));
  const roleKey = document.getElementById("roleKey");
  if (roleKey) roleKey.classList.remove("visible");
  searchInput.value = "";
  searchClear.style.display = "none";
  searchDropdown.classList.remove("visible");
  selectedIdx = -1;
  renderGraphState();
}

function applyV2Filter(v2type, force) {
  if (!force && activeFilter && activeFilter.type === "v2" && activeFilter.value === v2type) {
    clearFilter();
    return;
  }
  activeFilter = { type: "v2", value: v2type };
  renderGraphState();
}

function applyNodeFilter(nodeId, force) {
  if (!force && activeFilter && activeFilter.type === "node" && activeFilter.value === nodeId) {
    clearFilter();
    return;
  }
  activeFilter = { type: "node", value: nodeId };
  renderGraphState();
}

function applyFrameFilter(frame, force) {
  if (!force && activeFilter && activeFilter.type === "frame" && activeFilter.value === frame) {
    clearFilter();
    return;
  }
  activeFilter = { type: "frame", value: frame };
  renderGraphState();
}

function reapplyFilter() {
  renderGraphState();
}

function renderLinkTooltip(d) {
  const typeLabel = v2Labels[d.v2].split('\xb7')[1]?.trim() || d.v2;
  const trail = extractPathTrail(d);
  const chainLength = Math.max(1, trail.nodes.length - 1);
  return `
    ${renderTooltipHeader(`${d.v2} - ${typeLabel}`, v2Colors[d.v2])}
    <div class="tt-row"><span class="tt-key">from</span><span class="tt-val">${getLinkId(d.source)}</span></div>
    <div class="tt-row"><span class="tt-key">to</span><span class="tt-val">${getLinkId(d.target)}</span></div>
    <div class="tt-row"><span class="tt-key">frame</span><span class="tt-val">${d.frame}</span></div>
    <div class="tt-row"><span class="tt-key">chain</span><span class="tt-val">${chainLength}</span></div>
    <div class="tt-divider"></div>
    <div class="tt-row"><span class="tt-key">read</span><span class="tt-val">${d.reading}</span></div>
    <div class="tt-row"><span class="tt-key">path</span><span class="tt-val">${trail.trail}</span></div>
  `;
}

function renderTooltipHeader(title, color) {
  return `
    <div class="tt-header">
      <div class="tt-header-copy">
        <div class="tt-title" style="color:${color}">${title}</div>
        <div class="tt-meta">${tooltipState.pinned ? "Pinned panel - drag header to move" : "Hover preview - click item to pin"}</div>
      </div>
      ${tooltipState.pinned ? '<button class="tt-close-btn" type="button" title="Unpin panel">&times;</button>' : ''}
    </div>
  `;
}

function applyNodeHoverState(d, connections) {
  renderGraphState();
  const focusColor = getSelectionColor(d.id, "#f8fafc");
  link.attr("stroke-opacity", l =>
    (getLinkId(l.source) === d.id || getLinkId(l.target) === d.id) ? 0.78 : 0.04
  );
  node.select("circle:nth-child(2)").attr("fill-opacity", n =>
    n.id === d.id ? 0.45 : connections.some(l => getLinkId(l.source) === n.id || getLinkId(l.target) === n.id) ? 0.18 : 0.06
  ).attr("stroke", n =>
    n.id === d.id ? focusColor : neutralNodeStroke
  );
  d3.selectAll(node.nodes()).filter(n => connections.some(l => getLinkId(l.source) === n.id || getLinkId(l.target) === n.id))
    .select("circle:nth-child(2)")
    .attr("fill", "rgba(255,255,255,0.14)")
    .attr("stroke", n => n.id === d.id ? focusColor : "rgba(255,255,255,0.5)")
    .attr("stroke-opacity", n => n.id === d.id ? 0.95 : 0.4);
  d3.selectAll(node.nodes()).filter(n => n.id === d.id).select("circle:nth-child(2)")
    .attr("fill", focusColor)
    .attr("stroke", focusColor)
    .attr("stroke-opacity", 0.95);
}

function clearNodeHoverState() {
  renderGraphState();
}

function renderGraphState() {
  const focusSources = getFocusSources();
  const hasNodeFocusMode = focusSources.length > 0 && (!activeFilter || activeFilter.type === "node");
  const labelScale = getAdaptiveLabelScale();

  link
    .attr("stroke", neutralLinkStroke)
    .attr("stroke-opacity", d => d.v2 === "UR" ? neutralLinkMutedOpacity : neutralLinkBaseOpacity)
    .attr("stroke-width", d => d.v2 === "NS" ? 1.8 : 1)
    .attr("stroke-dasharray", d => d.v2 === "UR" ? "3,5" : "none");

  node.selectAll(".role-arc").remove();
  node.select("circle:nth-child(1)")
    .attr("r", d => getRadius(d) + 3)
    .attr("stroke", neutralNodeStroke)
    .attr("stroke-width", 1.2)
    .attr("stroke-opacity", 0.12);
  node.select("circle:nth-child(2)")
    .attr("r", d => getRadius(d))
    .attr("fill", neutralNodeFill)
    .attr("fill-opacity", 1)
    .attr("stroke", neutralNodeStroke)
    .attr("stroke-width", 1.2)
    .attr("stroke-opacity", 0.55);
  node.select("text")
    .attr("fill", "rgba(255,255,255,0.45)")
    .attr("fill-opacity", 1)
    .attr("font-size", `${(9 * labelScale).toFixed(1)}px`)
    .attr("font-weight", 400);

  document.querySelectorAll(".legend-item").forEach(item => item.classList.remove("dimmed", "active"));
  const roleKey = document.getElementById("roleKey");
  if (roleKey) roleKey.classList.remove("visible");

  if (activeFilter) {
    if (activeFilter.type === "v2") {
      const v2type = activeFilter.value;
      const typeLinks = links.filter(l => l.v2 === v2type);
      const sources = new Set(typeLinks.map(l => getLinkId(l.source)));
      const targets = new Set(typeLinks.map(l => getLinkId(l.target)));
      const connected = new Set([...sources, ...targets]);
      const isAsymmetric = v2type === "NS" || v2type === "EM";

      link
        .attr("stroke", d => d.v2 === v2type ? v2Colors[v2type] : neutralLinkStroke)
        .attr("stroke-opacity", d => d.v2 === v2type ? 0.62 : 0.02);

      document.querySelectorAll(".legend-item").forEach(item => {
        const match = item.dataset.v2 === v2type;
        item.classList.toggle("active", match);
        item.classList.toggle("dimmed", !match);
      });

      if (!isAsymmetric) {
        node.select("circle:nth-child(1)")
          .attr("stroke", n => connected.has(n.id) ? v2Colors[v2type] : neutralNodeStroke)
          .attr("stroke-opacity", n => connected.has(n.id) ? 0.2 : 0.03);
        node.select("circle:nth-child(2)")
          .attr("fill", n => connected.has(n.id) ? "rgba(255,255,255,0.08)" : neutralNodeFill)
          .attr("fill-opacity", n => connected.has(n.id) ? 1 : 0.4)
          .attr("stroke", n => connected.has(n.id) ? v2Colors[v2type] : neutralNodeStroke)
          .attr("stroke-opacity", n => connected.has(n.id) ? 0.92 : 0.08);
      } else {
        if (roleKey) roleKey.classList.add("visible");
        node.each(function(d) {
          const isSrc = sources.has(d.id);
          const isTgt = targets.has(d.id);
          const el = d3.select(this);
          const r = getRadius(d);

          if (!isSrc && !isTgt) {
            el.select("circle:nth-child(1)").attr("stroke-opacity", 0.02);
            el.select("circle:nth-child(2)").attr("stroke-opacity", 0.08).attr("fill-opacity", 0.35);
            return;
          }

          if (isSrc && isTgt) {
            const arcs = splitCircleArcs(r);
            el.select("circle:nth-child(2)").attr("stroke-opacity", 0).attr("fill-opacity", 0.15);
            el.insert("path", "text").attr("class", "role-arc")
              .attr("d", arcs.right).attr("fill", "none")
              .attr("stroke", roleColors.inner).attr("stroke-width", 2).attr("opacity", 0.9);
            el.insert("path", "text").attr("class", "role-arc")
              .attr("d", arcs.left).attr("fill", "none")
              .attr("stroke", roleColors.outer).attr("stroke-width", 2).attr("opacity", 0.9);
          } else if (isSrc) {
            el.select("circle:nth-child(1)").attr("stroke", roleColors.inner).attr("stroke-opacity", 0.16);
            el.select("circle:nth-child(2)")
              .attr("fill", "rgba(255,255,255,0.08)")
              .attr("stroke", roleColors.inner)
              .attr("stroke-opacity", 0.9);
          } else {
            el.select("circle:nth-child(1)").attr("stroke", roleColors.outer).attr("stroke-opacity", 0.16);
            el.select("circle:nth-child(2)")
              .attr("fill", "rgba(255,255,255,0.08)")
              .attr("stroke", roleColors.outer)
              .attr("stroke-opacity", 0.9);
          }
        });
      }
    } else if (activeFilter.type === "node") {
      const nodeId = activeFilter.value;
      link
        .attr("stroke", neutralLinkStroke)
        .attr("stroke-opacity", 0.02);
      node.select("circle:nth-child(1)")
        .attr("stroke", neutralNodeStroke)
        .attr("stroke-opacity", n => n.id === nodeId ? 0.16 : 0.03);
      node.select("circle:nth-child(2)")
        .attr("fill", neutralNodeFill)
        .attr("fill-opacity", n => n.id === nodeId ? 0.95 : 0.28)
        .attr("stroke", neutralNodeStroke)
        .attr("stroke-opacity", n => n.id === nodeId ? 0.95 : 0.08);
    } else if (activeFilter.type === "frame") {
      const frame = activeFilter.value;
      const connected = new Set();
      links.filter(l => l.frame === frame).forEach(l => {
        connected.add(getLinkId(l.source));
        connected.add(getLinkId(l.target));
      });

      link
        .attr("stroke", d => d.frame === frame ? "#93c5fd" : neutralLinkStroke)
        .attr("stroke-opacity", d => d.frame === frame ? 0.58 : 0.02);
      node.select("circle:nth-child(1)")
        .attr("stroke", n => connected.has(n.id) ? "#93c5fd" : neutralNodeStroke)
        .attr("stroke-opacity", n => connected.has(n.id) ? 0.18 : 0.03);
      node.select("circle:nth-child(2)")
        .attr("fill", n => connected.has(n.id) ? "rgba(255,255,255,0.14)" : neutralNodeFill)
        .attr("fill-opacity", n => connected.has(n.id) ? 1 : 0.35)
        .attr("stroke", n => connected.has(n.id) ? "#93c5fd" : neutralNodeStroke)
        .attr("stroke-opacity", n => connected.has(n.id) ? 0.82 : 0.08);
    }
  }

  const neighborhoodAssignments = buildNeighborhoodAssignments(focusNeighborhoodMaxDepth);

  if (hasNodeFocusMode) {
    link
      .attr("stroke", neutralLinkStroke)
      .attr("stroke-opacity", d => d.v2 === "UR" ? 0.008 : 0.015)
      .attr("stroke-width", 0.95);
    node.select("circle:nth-child(1)")
      .attr("stroke", neutralNodeStroke)
      .attr("stroke-width", 1)
      .attr("stroke-opacity", 0.025);
    node.select("circle:nth-child(2)")
      .attr("fill", neutralNodeFill)
      .attr("fill-opacity", 0.22)
      .attr("stroke", neutralNodeStroke)
      .attr("stroke-width", 1)
      .attr("stroke-opacity", 0.1);
    node.select("text")
      .attr("fill", "rgba(255,255,255,0.24)")
      .attr("fill-opacity", 0.72)
      .attr("font-size", `${(8.5 * labelScale).toFixed(1)}px`)
      .attr("font-weight", 400);
  }

  neighborhoodAssignments.linkAssignments.forEach((assignment, linkDatum) => {
    const visualDistance = Math.min(focusNeighborhoodMaxDepth, assignment.distance + 1);
    const distanceColor = getDistanceColor(assignment.color, visualDistance);
    const opacityByDistance = [0.96, 0.66, 0.36];
    const widthByDistance = [2.7, 1.95, 1.3];
    link.filter(d => d === linkDatum)
      .attr("stroke", distanceColor)
      .attr("stroke-opacity", opacityByDistance[visualDistance - 1] || 0.32)
      .attr("stroke-width", widthByDistance[visualDistance - 1] || 1.25);
  });

  neighborhoodAssignments.nodeAssignments.forEach((assignment, nodeId) => {
    d3.selectAll(node.nodes())
      .filter(d => d.id === nodeId)
      .each(function(nodeDatum) {
        const el = d3.select(this);
        const isSource = assignment.distance === 0;
        const distanceColor = getDistanceColor(assignment.color, assignment.distance);
        const cappedDistance = Math.min(focusNeighborhoodMaxDepth, assignment.distance);
        const outerOpacityByDistance = [0.56, 0.24, 0.11, 0.06];
        const outerWidthByDistance = [2.6, 1.55, 1.15, 1];
        const outerRadiusBoostByDistance = [8, 3.5, 1.25, 0];
        const strokeOpacityByDistance = [1, 0.9, 0.62, 0.38];
        const fillOpacityByDistance = [1, 0.82, 0.44, 0.2];
        const strokeWidthByDistance = [3.2, 2.1, 1.4, 1.05];
        const innerRadiusBoostByDistance = [2.6, 1.1, 0.4, 0];
        const textOpacityByDistance = [1, 0.96, 0.72, 0.46];
        const textSizeByDistance = [12, 10, 9, 8.5].map(size => `${(size * labelScale).toFixed(1)}px`);
        const textWeightByDistance = [700, 600, 500, 400];
        el.select("circle:nth-child(1)")
          .attr("r", getRadius(nodeDatum) + 3 + (outerRadiusBoostByDistance[cappedDistance] || 0))
          .attr("stroke", distanceColor)
          .attr("stroke-width", outerWidthByDistance[cappedDistance] || 1)
          .attr("stroke-opacity", outerOpacityByDistance[cappedDistance] || 0.08);
        el.select("circle:nth-child(2)")
          .attr("r", getRadius(nodeDatum) + (innerRadiusBoostByDistance[cappedDistance] || 0))
          .attr("fill", distanceColor)
          .attr("fill-opacity", fillOpacityByDistance[cappedDistance] || 0.24)
          .attr("stroke", distanceColor)
          .attr("stroke-width", strokeWidthByDistance[cappedDistance] || 1.2)
          .attr("stroke-opacity", strokeOpacityByDistance[cappedDistance] || 0.42);
        el.select("text")
          .attr("fill", isSource ? "#ffffff" : distanceColor)
          .attr("fill-opacity", textOpacityByDistance[cappedDistance] || 0.42)
          .attr("font-size", textSizeByDistance[cappedDistance] || "8.5px")
          .attr("font-weight", textWeightByDistance[cappedDistance] || 400);
      });
  });

  if (searchState.path && searchState.path.found) {
    const pathNodeSet = new Set(searchState.path.nodes);
    const pathLinks = new Set(searchState.path.steps.map(step => step.link));
    link.filter(d => pathLinks.has(d))
      .attr("stroke", "#f59e0b")
      .attr("stroke-opacity", 0.92)
      .attr("stroke-width", 2.6);

    node.each(function(d) {
      if (!pathNodeSet.has(d.id)) return;
      const el = d3.select(this);
      const isA = d.id === searchState.pair.a;
      const isB = d.id === searchState.pair.b;
      const color = isA ? getSelectionColor(d.id, "#f97316") : isB ? getSelectionColor(d.id, "#38bdf8") : "#fbbf24";
      el.select("circle:nth-child(1)").attr("stroke", color).attr("stroke-opacity", 0.22);
      el.select("circle:nth-child(2)")
        .attr("fill", "rgba(255,255,255,0.14)")
        .attr("fill-opacity", 1)
        .attr("stroke", color)
        .attr("stroke-width", isA || isB ? 2 : 1.7)
        .attr("stroke-opacity", 1);
      el.select("text")
        .attr("fill", "#ffffff")
        .attr("fill-opacity", 1)
        .attr("font-size", isA || isB ? `${(11 * labelScale).toFixed(1)}px` : `${(9.5 * labelScale).toFixed(1)}px`)
        .attr("font-weight", isA || isB ? 700 : 600);
    });
  }

  if (searchState.orbitMode) {
    const orbitCenterId = getOrbitCenterId();
    if (orbitCenterId) {
      applyOrbitLayout(orbitCenterId, focusNeighborhoodMaxDepth);
    } else {
      clearOrbitLayout();
    }
  } else if (layoutState.orbitCenterId) {
    clearOrbitLayout();
  }

  if (uiState.compact || searchState.orbitMode) {
    scheduleSmartFit(false, searchState.orbitMode, searchState.orbitMode ? 110 : 180);
  }

  updateOrbitToggle();
  updateArrowVisibility();
}

buildSearchItems();
updateStats();
renderSearchSelection();
renderPathPanel();
applyResponsiveUI(true);
syncPanelVisibility();
renderGraphState();
updateArrowVisibility();
renderToolDropdown();

document.querySelectorAll("[data-close-panel]").forEach(btn => {
  btn.addEventListener("click", e => {
    e.stopPropagation();
    setPanelVisibility(btn.dataset.closePanel, false);
  });
});

toolMenuTrigger.addEventListener("click", e => {
  e.stopPropagation();
  toolDropdown.classList.toggle("visible");
});

oneFingerGuideBtn.addEventListener("click", e => {
  e.stopPropagation();
  openGestureGuide("one");
});

twoFingerGuideBtn.addEventListener("click", e => {
  e.stopPropagation();
  openGestureGuide("two");
});

gestureHelpCloseBtn.addEventListener("click", e => {
  e.stopPropagation();
  closeGestureGuide();
});

gestureHelpOverlay.addEventListener("click", e => {
  if (e.target === gestureHelpOverlay) closeGestureGuide();
});

searchInput.addEventListener("input", () => {
  const q = searchInput.value.toLowerCase().trim();
  searchClear.style.display = q ? "block" : "none";
  if (!q) {
    searchDropdown.classList.remove("visible");
    selectedIdx = -1;
    return;
  }
  renderSearchDropdown(getSearchMatches(q));
});

searchInput.addEventListener("keydown", e => {
  const flat = searchDropdown._flat || [];
  if (e.key === "ArrowDown") {
    e.preventDefault();
    selectedIdx = Math.min(selectedIdx + 1, flat.length - 1);
    hlSearchResult();
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    selectedIdx = Math.max(selectedIdx - 1, -1);
    hlSearchResult();
  } else if (e.key === "Enter" && selectedIdx >= 0 && flat[selectedIdx]) {
    e.preventDefault();
    flat[selectedIdx].action();
    searchInput.value = flat[selectedIdx].label;
    searchClear.style.display = "block";
    searchDropdown.classList.remove("visible");
  } else if (e.key === "Escape") {
    clearFilter();
    searchInput.blur();
  }
});

searchAddInline.addEventListener("click", e => {
  e.preventDefault();
  addHighlightedResult();
});

searchClear.addEventListener("click", () => {
  clearFilter();
  searchInput.focus();
});

pathDepthInput.addEventListener("change", refreshRelationshipState);
pathDepthInput.addEventListener("input", refreshRelationshipState);

fitViewBtn.addEventListener("click", () => {
  uiState.userAdjustedZoom = false;
  scheduleSmartFit(true, true, 0);
});

orbitToggleBtn.addEventListener("click", () => {
  searchState.orbitMode = !searchState.orbitMode;
  if (searchState.orbitMode) uiState.userAdjustedZoom = false;
  renderGraphState();
});

arrowToggleBtn.addEventListener("click", () => {
  searchState.showArrows = !searchState.showArrows;
  updateArrowVisibility();
});

document.addEventListener("click", e => {
  if (!e.target.closest(".search-container")) searchDropdown.classList.remove("visible");
  if (!e.target.closest("#toolMenu")) toolDropdown.classList.remove("visible");
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape" && activeGestureGuideMode) closeGestureGuide();
});

// ─── INITIAL ZOOM ───

setTimeout(() => {
  scheduleSmartFit(true, true, 0);
}, 500);
</script>
</body>
</html>
