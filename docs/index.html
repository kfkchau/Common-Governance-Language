<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venn2 Relational Geometry</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #c8c8d4;
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #chart { width: 100vw; height: 100vh; position: relative; }
  #chart > svg { width: 100%; height: 100%; display: block; touch-action: none; }

  .panel-hidden { display: none !important; }
  .panel-close {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 22px;
    height: 22px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.42);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .panel-close:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.18);
    color: #fff;
  }
  .tool-menu {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 40;
  }
  .tool-menu-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tool-trigger {
    appearance: none;
    border: none;
    background: none;
    padding: 0;
    color: rgba(255,255,255,0.24);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .tool-trigger:hover { color: rgba(255,255,255,0.6); }
  .gesture-trigger {
    appearance: none;
    border: none;
    background: none;
    padding: 0;
    min-width: 16px;
    min-height: 16px;
    color: rgba(255,255,255,0.24);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: color 0.14s ease, transform 0.14s ease;
  }
  .gesture-trigger:hover {
    color: rgba(255,255,255,0.62);
    transform: translateY(-1px);
  }
  .gesture-trigger .dot-cluster {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }
  .gesture-trigger .dot-cluster span {
    width: 4px;
    height: 4px;
    border-radius: 999px;
    background: currentColor;
    display: block;
  }
  .tool-dropdown {
    display: none;
    margin-top: 10px;
    min-width: 180px;
    background: rgba(10, 10, 15, 0.92);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    backdrop-filter: blur(16px);
    padding: 6px;
  }
  .tool-dropdown.visible { display: block; }
  .tool-item {
    appearance: none;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border: none;
    background: none;
    border-radius: 8px;
    padding: 8px 9px;
    color: rgba(255,255,255,0.62);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-align: left;
  }
  .tool-item:hover {
    background: rgba(255,255,255,0.06);
    color: #fff;
  }
  .tool-item-state {
    color: rgba(255,255,255,0.28);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 9px;
  }

  /* ─── LEGEND ─── */
  .legend {
    position: fixed;
    top: 54px;
    left: 20px;
    z-index: 10;
    background: rgba(10, 10, 15, 0.85);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 16px 20px;
    backdrop-filter: blur(16px);
    font-size: 12px;
    line-height: 1;
  }
  .legend h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 14px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    opacity: 1;
    transition: opacity 0.2s;
  }
  .legend-item:hover { opacity: 0.85; }
  .legend-item.dimmed { opacity: 0.2; }
  .legend-item.active { opacity: 1; }
  .legend-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
  }
  .legend-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.25);
    margin-left: auto;
  }
  .legend-icon circle {
    cursor: pointer;
    transition: opacity 0.15s, stroke-width 0.15s;
  }
  .legend-icon circle:hover {
    opacity: 1 !important;
    stroke-width: 2.2 !important;
  }
  .legend-role-key {
    display: none;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .legend-role-key.visible { display: block; }
  .legend-role-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.45);
  }
  .legend-role-swatch {
    width: 14px;
    height: 3px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ─── TOOLTIP ─── */
  .tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    background: rgba(12, 12, 20, 0.92);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 14px 18px;
    backdrop-filter: blur(20px);
    max-width: 360px;
    opacity: 0;
    transition: opacity 0.15s;
    font-size: 12px;
  }
  .tooltip.visible { opacity: 1; }
  .tooltip.pinned {
    pointer-events: auto;
    width: min(380px, calc(100vw - 32px));
    max-width: min(380px, calc(100vw - 32px));
  }
  .tooltip.dragging { cursor: grabbing; }
  .tooltip .tt-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }
  .tooltip.pinned .tt-header {
    cursor: grab;
    user-select: none;
  }
  .tooltip .tt-header-copy {
    min-width: 0;
    flex: 1;
  }
  .tooltip .tt-title { font-weight: 600; font-size: 13px; color: #fff; margin-bottom: 6px; }
  .tooltip .tt-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.24);
  }
  .tooltip .tt-close-btn,
  .tooltip .tt-more-btn {
    appearance: none;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.7);
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .tooltip .tt-close-btn:hover,
  .tooltip .tt-more-btn:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.18);
    color: #fff;
  }
  .tooltip .tt-close-btn {
    width: 26px;
    height: 26px;
    line-height: 1;
    font-size: 15px;
    flex-shrink: 0;
  }
  .tooltip .tt-row {
    display: flex; gap: 8px; margin-bottom: 3px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
  }
  .tooltip .tt-key { color: rgba(255,255,255,0.35); flex-shrink: 0; min-width: 55px; }
  .tooltip .tt-val { color: rgba(255,255,255,0.75); }
  .tooltip .tt-val,
  .tooltip .tt-title {
    overflow-wrap: anywhere;
  }
  .tooltip .tt-divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 10px 0 9px;
  }
  .tooltip .tt-section {
    margin-top: 4px;
  }
  .tooltip .tt-section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.24);
    margin-bottom: 7px;
  }
  .tooltip .tt-relations {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .tooltip .tt-relations.expanded {
    max-height: 248px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .tooltip .tt-relations.expanded::-webkit-scrollbar { width: 4px; }
  .tooltip .tt-relations.expanded::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
  }
  .tooltip .tt-connection {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    min-width: 0;
  }
  .tooltip .tt-connection-copy {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .tooltip .tt-connection-label {
    color: rgba(255,255,255,0.78);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    overflow-wrap: anywhere;
  }
  .tooltip .tt-connection-sub {
    color: rgba(255,255,255,0.22);
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    overflow-wrap: anywhere;
  }
  .tooltip .tt-more-btn {
    margin-top: 10px;
    padding: 7px 10px;
    font-size: 10px;
  }

  /* ─── CHROME ─── */
  .title-block { position: fixed; bottom: 20px; left: 20px; z-index: 10; padding-right: 30px; }
  .title-block .panel-close { top: -6px; right: -2px; }
  .title-block h1 {
    font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700;
    color: rgba(255,255,255,0.12); letter-spacing: -0.5px;
  }
  .title-block p {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: rgba(255,255,255,0.15); margin-top: 4px;
  }
  .stats {
    position: fixed; top: 20px; right: 20px; z-index: 10;
    text-align: right; font-family: 'JetBrains Mono', monospace; padding-right: 30px;
  }
  .stats .panel-close { top: -2px; right: 0; }
  .stats .big { font-size: 36px; font-weight: 300; color: rgba(255,255,255,0.08); line-height: 1; }
  .stats .label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.2); margin-top: 2px; }
  .stats .divider { height: 1px; background: rgba(255,255,255,0.04); margin: 10px 0; }

  /* ─── SEARCH BAR ─── */
  .search-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 20;
    width: min(440px, calc(100vw - 40px));
  }
  .search-shell {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-top: 28px;
  }
  .search-selection {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .search-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    min-width: 0;
  }
  .search-chip-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    flex-shrink: 0;
  }
  .search-chip-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.76);
    max-width: 150px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .search-chip-actions {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .search-chip-role,
  .search-chip-remove,
  .search-tool-btn,
  .search-result-add {
    appearance: none;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.5);
    border-radius: 999px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .search-chip-role:hover,
  .search-chip-remove:hover,
  .search-tool-btn:hover,
  .search-result-add:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.18);
    color: #fff;
  }
  .search-chip-role {
    padding: 3px 6px;
    font-size: 9px;
    line-height: 1;
  }
  .search-chip-role.active {
    color: #fff;
    border-color: rgba(255,255,255,0.22);
  }
  .search-chip-remove {
    width: 18px;
    height: 18px;
    font-size: 12px;
    line-height: 1;
  }
  .search-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
    background: rgba(10, 10, 15, 0.85);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    backdrop-filter: blur(16px);
    padding: 0 12px;
    transition: border-color 0.2s;
  }
  .search-input-wrap:focus-within {
    border-color: rgba(255,255,255,0.2);
  }
  .search-icon {
    color: rgba(255,255,255,0.25);
    font-size: 13px;
    flex-shrink: 0;
    margin-right: 8px;
  }
  .search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: rgba(255,255,255,0.75);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 10px 0;
    width: 100%;
  }
  .search-input::placeholder {
    color: rgba(255,255,255,0.2);
  }
  .search-add-inline {
    appearance: none;
    border: none;
    background: none;
    color: rgba(255,255,255,0.26);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 0 4px 8px;
  }
  .search-add-inline:hover { color: rgba(255,255,255,0.7); }
  .search-clear {
    display: none;
    background: none;
    border: none;
    color: rgba(255,255,255,0.3);
    cursor: pointer;
    font-size: 14px;
    padding: 4px;
    line-height: 1;
    flex-shrink: 0;
  }
  .search-clear:hover { color: rgba(255,255,255,0.6); }
  .search-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .search-toolbar-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .search-toolbar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.24);
  }
  .search-depth-input {
    width: 54px;
    padding: 6px 8px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(10, 10, 15, 0.7);
    color: rgba(255,255,255,0.74);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    outline: none;
  }
  .search-depth-input:focus {
    border-color: rgba(255,255,255,0.18);
  }
  .search-tool-btn {
    padding: 6px 10px;
    font-size: 10px;
  }
  .search-tool-btn.active {
    color: #fff;
    border-color: rgba(255,255,255,0.2);
  }
  .path-panel {
    background: rgba(10, 10, 15, 0.82);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    backdrop-filter: blur(16px);
    padding: 12px 14px;
    min-height: 72px;
  }
  .path-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }
  .path-panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.24);
  }
  .path-panel-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.48);
  }
  .path-panel-empty {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.34);
    line-height: 1.5;
  }
  .path-panel-scroll {
    max-height: 200px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .path-panel-scroll::-webkit-scrollbar { width: 4px; }
  .path-panel-scroll::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
  }
  .path-pill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .path-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.66);
  }
  .path-sequence {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .path-step {
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    padding: 9px 10px;
  }
  .path-step-main {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    min-width: 0;
  }
  .path-step-index {
    width: 18px;
    height: 18px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.76);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .path-step-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    overflow-wrap: anywhere;
  }
  .path-step-meta,
  .path-step-trail {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.3);
    line-height: 1.5;
    overflow-wrap: anywhere;
  }

  .search-dropdown {
    position: absolute;
    bottom: 100%;
    left: 0;
    right: 0;
    margin-bottom: 6px;
    background: rgba(12, 12, 20, 0.95);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    backdrop-filter: blur(20px);
    max-height: 420px;
    overflow-y: auto;
    display: none;
    padding: 6px 0;
  }
  .search-dropdown.visible { display: block; }
  .search-dropdown::-webkit-scrollbar { width: 4px; }
  .search-dropdown::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .search-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    padding: 8px 14px 4px;
  }
  .search-result {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 7px 12px 7px 14px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .search-result:hover, .search-result.highlighted {
    background: rgba(255,255,255,0.05);
  }
  .search-result-main {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    min-width: 0;
    flex: 1;
  }
  .search-result-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .search-result-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.2);
    flex-shrink: 0;
    margin-left: 8px;
  }
  .search-result-add {
    width: 24px;
    height: 24px;
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
  }
  .search-result-add:disabled {
    opacity: 0.35;
    cursor: default;
  }
  .search-empty {
    padding: 12px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
  }

  body.compact-ui .tool-menu {
    top: max(12px, env(safe-area-inset-top));
    left: max(12px, env(safe-area-inset-left));
  }
  body.compact-ui .tool-menu-row {
    gap: 10px;
  }
  body.compact-ui .tool-trigger {
    font-size: 12px;
    letter-spacing: 1.5px;
  }
  body.compact-ui .gesture-trigger .dot-cluster span {
    width: 5px;
    height: 5px;
  }
  body.compact-ui .tool-dropdown {
    min-width: min(220px, calc(100vw - 24px));
  }
  body.compact-ui .panel-close {
    width: 28px;

  AD: "Adjacent \xb7 touching",
  NS: "Nested \xb7 contained",
  EM: "Embedded \xb7 deep",
  IN: "Intersecting \xb7 overlap",
  UR: "Unrelated \xb7 no contact"
};
const groupColors = {
  person: "#f9a8d4", organisation: "#93c5fd", system: "#a78bfa",
  artefact: "#fcd34d", data: "#6ee7b7", concept: "#e5e7eb",
  event: "#fb923c", physical: "#f87171"
};
const roleColors = { inner: "#4ade80", outer: "#38bdf8" };
const otherCol = '#9ca3af';
const neutralNodeStroke = "rgba(255,255,255,0.26)";
const neutralNodeFill = "rgba(255,255,255,0.08)";
const neutralLinkStroke = "rgba(148,163,184,0.42)";
const neutralLinkMutedOpacity = 0.05;
const neutralLinkBaseOpacity = 0.17;
const selectionPalette = ["#f97316", "#38bdf8", "#a78bfa", "#f472b6", "#34d399"];
const focusNeighborhoodMaxDepth = 3;
const compactUiBreakpoint = 820;
const compactUiHeightBreakpoint = 700;
const uiState = {
  compact: window.innerWidth <= compactUiBreakpoint || window.innerHeight <= compactUiHeightBreakpoint,
  userAdjustedZoom: false,
  hasAutoFitted: false,
  compactPanelsApplied: false,
  desktopPanelsApplied: false,
  smartFitTimer: null
};
let isProgrammaticZoom = false;
let programmaticZoomReleaseTimer = null;

// ─── SVG SETUP ───

let width = window.innerWidth;
let height = window.innerHeight;
const svg = d3.select("#chart").append("svg").attr("viewBox", [0, 0, width, height]);

const defs = svg.append("defs");
const glow = defs.append("filter").attr("id", "glow");
glow.append("feGaussianBlur").attr("stdDeviation", "3").attr("result", "blur");
glow.append("feMerge").selectAll("feMergeNode")
  .data(["blur", "SourceGraphic"]).join("feMergeNode").attr("in", d => d);

Object.entries(v2Colors).forEach(([key, color]) => {
  defs.append("marker").attr("id", `arrow-${key}`)
    .attr("viewBox", "0 -4 8 8").attr("refX", 18).attr("refY", 0)
    .attr("markerWidth", 6).attr("markerHeight", 6).attr("orient", "auto")
    .append("path").attr("d", "M0,-3L7,0L0,3").attr("fill", color).attr("opacity", 0.6);
});

function getBaseLinkDistance(d) {
  const base = d.v2 === "NS" ? 55 : 90;
  return uiState.compact ? base * 0.82 : base;
}

function getChargeStrength() {
  return uiState.compact ? -230 : -300;
}

const g = svg.append("g");
const zoom = d3.zoom().scaleExtent([0.18, 6]).on("zoom", (e) => {
  if (e.sourceEvent && !isProgrammaticZoom) uiState.userAdjustedZoom = true;
  g.attr("transform", e.transform);
});
svg.call(zoom);

// ─── SIMULATION ───

const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(getBaseLinkDistance))
  .force("charge", d3.forceManyBody().strength(getChargeStrength))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide().radius(22))
  .force("x", d3.forceX(width / 2).strength(uiState.compact ? 0.055 : 0.04))
  .force("y", d3.forceY(height / 2).strength(uiState.compact ? 0.055 : 0.04));

// ─── LINKS ───

const link = g.append("g").selectAll("line").data(links).join("line")
  .attr("stroke", neutralLinkStroke)
  .attr("stroke-opacity", d => d.v2 === "UR" ? neutralLinkMutedOpacity : neutralLinkBaseOpacity)
  .attr("stroke-width", d => d.v2 === "NS" ? 1.8 : 1)
  .attr("stroke-dasharray", d => d.v2 === "UR" ? "3,5" : "none")
  .attr("marker-end", null)
  .style("pointer-events", "none");

const linkHitArea = g.append("g").selectAll("line").data(links).join("line")
  .attr("stroke", "rgba(255,255,255,0)")
  .attr("stroke-width", uiState.compact ? 22 : 14)
  .attr("fill", "none")
  .style("pointer-events", "stroke");

// ─── NODES ───

const node = g.append("g").selectAll("g").data(nodes).join("g")
  .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));

node.append("circle")
  .attr("r", d => getRadius(d) + 3)
  .attr("fill", "none")
  .attr("stroke", neutralNodeStroke)
  .attr("stroke-opacity", 0.12)
  .attr("filter", "url(#glow)");

node.append("circle")
  .attr("r", d => getRadius(d))
  .attr("fill", neutralNodeFill)
  .attr("fill-opacity", 1)
  .attr("stroke", neutralNodeStroke)
  .attr("stroke-width", 1.2)
  .attr("stroke-opacity", 0.55);

node.append("text")
  .text(d => truncate(d.id, 18))
  .attr("dy", d => getRadius(d) + 14)
  .attr("text-anchor", "middle")
  .attr("fill", "rgba(255,255,255,0.45)")
  .attr("font-family", "'Space Grotesk', sans-serif")
  .attr("font-size", "9px")
  .attr("font-weight", 400)
  .attr("pointer-events", "none");

function getRadius(d) {
  const count = links.filter(l =>
    (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id
  ).length;
  return Math.max(5, Math.min(16, 4 + count * 1.2));
}

function truncate(s, n) {
  return s.length > n ? s.slice(0, n - 1) + '\u2026' : s;
}

// ─── TOOLTIP ICON (for node hover popup) ───

function venn2Icon(v2type, selfColor, hoveredIsSource) {
  const w = 40, h = 22, cy = 11;
  let parts = '';
  switch(v2type) {
    case 'UR':
      parts = `<circle cx="10" cy="${cy}" r="7" fill="none" stroke="${selfColor}" stroke-width="1.4" opacity="0.85"/>
        <circle cx="30" cy="${cy}" r="7" fill="none" stroke="${otherCol}" stroke-width="1.4" opacity="0.7"/>`;
      break;
    case 'AD':
      parts = `<circle cx="13" cy="${cy}" r="7" fill="none" stroke="${selfColor}" stroke-width="1.4" opacity="0.85"/>
        <circle cx="27" cy="${cy}" r="7" fill="none" stroke="${otherCol}" stroke-width="1.4" opacity="0.7"/>`;
      break;
    case 'IN':
      parts = `<circle cx="15" cy="${cy}" r="8" fill="none" stroke="${selfColor}" stroke-width="1.4" opacity="0.85"/>
        <circle cx="25" cy="${cy}" r="8" fill="none" stroke="${otherCol}" stroke-width="1.4" opacity="0.7"/>`;
      break;
    case 'NS': {
      const outerC = hoveredIsSource ? otherCol : selfColor;
      const innerC = hoveredIsSource ? selfColor : otherCol;
      parts = `<circle cx="20" cy="${cy}" r="10" fill="none" stroke="${outerC}" stroke-width="1.4" opacity="0.75"/>
        <circle cx="24" cy="${cy}" r="5" fill="none" stroke="${innerC}" stroke-width="1.4" opacity="0.9"/>`;
      break;
    }
    case 'EM': {
      const outerC2 = hoveredIsSource ? otherCol : selfColor;
      const innerC2 = hoveredIsSource ? selfColor : otherCol;
      parts = `<circle cx="20" cy="${cy}" r="10" fill="none" stroke="${outerC2}" stroke-width="1.4" opacity="0.75"/>
        <circle cx="20" cy="${cy}" r="4" fill="none" stroke="${innerC2}" stroke-width="1.4" opacity="0.9"/>`;
      break;
    }
    default:
      parts = `<circle cx="10" cy="${cy}" r="7" fill="none" stroke="${selfColor}" stroke-width="1.4" opacity="0.85"/>
        <circle cx="30" cy="${cy}" r="7" fill="none" stroke="${otherCol}" stroke-width="1.4" opacity="0.7"/>`;
  }
  return `<svg viewBox="0 0 ${w} ${h}" style="width:${w}px;height:${h}px;min-width:${w}px;vertical-align:middle;flex-shrink:0">${parts}</svg>`;
}

// ─── SPLIT CIRCLE ARCS (for role-based filtering) ───

function splitCircleArcs(r) {
  return {
    right: `M 0,${-r} A ${r},${r} 0 0,1 0,${r}`,
    left:  `M 0,${r} A ${r},${r} 0 0,1 0,${-r}`
  };
}

// ─── FILTER STATE ───

let activeFilter = null;

function clearFilter() {
  activeFilter = null;

  link.attr("stroke-opacity", d => d.v2 === "UR" ? 0.08 : 0.25)
      .attr("stroke", d => v2Colors[d.v2]);

  node.select("circle:nth-child(1)")
    .attr("stroke", d => groupColors[d.group]).attr("stroke-opacity", 0.12);
  node.select("circle:nth-child(2)")
    .attr("fill", d => groupColors[d.group]).attr("fill-opacity", 0.15)
    .attr("stroke", d => groupColors[d.group]).attr("stroke-width", 1.2).attr("stroke-opacity", 0.5);

  node.selectAll(".role-arc").remove();

  const legendEl = document.getElementById("legend");
  legendEl.querySelectorAll(".legend-item").forEach(i => i.classList.remove("dimmed", "active"));

  const roleKey = document.getElementById("roleKey");
  if (roleKey) roleKey.classList.remove("visible");

  const si = document.getElementById("searchInput");
  if (si) si.value = '';
  const sc = document.getElementById("searchClear");
  if (sc) sc.style.display = 'none';
  const sd = document.getElementById("searchDropdown");
  if (sd) sd.classList.remove("visible");
}

function applyV2Filter(v2type, force) {
  if (!force && activeFilter && activeFilter.type === 'v2' && activeFilter.value === v2type) {
    clearFilter(); return;
  }
  clearFilter();
  activeFilter = { type: 'v2', value: v2type };

  const typeLinks = links.filter(l => l.v2 === v2type);
  const sources = new Set(typeLinks.map(l => l.source.id));
  const targets = new Set(typeLinks.map(l => l.target.id));
  const connected = new Set([...sources, ...targets]);
  const isAsymmetric = v2type === 'NS' || v2type === 'EM';

  link.attr("stroke-opacity", d => d.v2 === v2type ? 0.6 : 0.02);

  // Update legend
  document.querySelectorAll(".legend-item").forEach(item => {
    const k = item.dataset.v2;
    item.classList.toggle("dimmed", k !== v2type);
    item.classList.toggle("active", k === v2type);
  });

  if (!isAsymmetric) {
    node.select("circle:nth-child(1)")
      .attr("stroke-opacity", n => connected.has(n.id) ? 0.12 : 0.02);
    node.select("circle:nth-child(2)")
      .attr("fill-opacity", n => connected.has(n.id) ? 0.25 : 0.03)
      .attr("stroke-opacity", n => connected.has(n.id) ? 0.6 : 0.08);
    return;
  }

  // Show role key
  const roleKey = document.getElementById("roleKey");
  if (roleKey) roleKey.classList.add("visible");

  // Asymmetric — role-based colouring
  node.each(function(d) {
    const isSrc = sources.has(d.id);
    const isTgt = targets.has(d.id);
    const el = d3.select(this);
    const r = getRadius(d);

    if (!isSrc && !isTgt) {
      el.select("circle:nth-child(2)").attr("fill-opacity", 0.02).attr("stroke-opacity", 0.06);
      el.select("circle:nth-child(1)").attr("stroke-opacity", 0.02);
      return;
    }

    if (isSrc && isTgt) {
      // Dual role — split circle
      el.select("circle:nth-child(2)").attr("stroke-opacity", 0).attr("fill-opacity", 0.04);
      el.select("circle:nth-child(1)").attr("stroke-opacity", 0.02);
      const arcs = splitCircleArcs(r);
      el.selectAll(".role-arc").remove();
      el.insert("path", "text").attr("class", "role-arc")
        .attr("d", arcs.right).attr("fill", "none")
        .attr("stroke", roleColors.inner).attr("stroke-width", 2).attr("opacity", 0.9);
      el.insert("path", "text").attr("class", "role-arc")
        .attr("d", arcs.left).attr("fill", "none")
        .attr("stroke", roleColors.outer).attr("stroke-width", 2).attr("opacity", 0.9);
    } else if (isSrc) {
      el.select("circle:nth-child(2)")
        .attr("stroke", roleColors.inner).attr("stroke-opacity", 0.85)
        .attr("fill", roleColors.inner).attr("fill-opacity", 0.1);
      el.select("circle:nth-child(1)")
        .attr("stroke", roleColors.inner).attr("stroke-opacity", 0.15);
    } else {
      el.select("circle:nth-child(2)")
        .attr("stroke", roleColors.outer).attr("stroke-opacity", 0.85)
        .attr("fill", roleColors.outer).attr("fill-opacity", 0.1);
      el.select("circle:nth-child(1)")
        .attr("stroke", roleColors.outer).attr("stroke-opacity", 0.15);
    }
  });
}

function applyNodeFilter(nodeId, force) {
  if (!force && activeFilter && activeFilter.type === 'node' && activeFilter.value === nodeId) {
    clearFilter(); return;
  }
  clearFilter();
  activeFilter = { type: 'node', value: nodeId };

  const connected = new Set([nodeId]);
  links.filter(l => l.source.id === nodeId || l.target.id === nodeId)
    .forEach(l => { connected.add(l.source.id); connected.add(l.target.id); });

  link.attr("stroke-opacity", l =>
    (l.source.id === nodeId || l.target.id === nodeId) ? 0.6 : 0.02
  );
  node.select("circle:nth-child(1)")
    .attr("stroke-opacity", n => connected.has(n.id) ? 0.12 : 0.02);
  node.select("circle:nth-child(2)")
    .attr("fill-opacity", n => n.id === nodeId ? 0.4 : connected.has(n.id) ? 0.2 : 0.03)
    .attr("stroke-opacity", n => connected.has(n.id) ? 0.6 : 0.08);
}

function applyFrameFilter(frame, force) {
  if (!force && activeFilter && activeFilter.type === 'frame' && activeFilter.value === frame) {
    clearFilter(); return;
  }
  clearFilter();
  activeFilter = { type: 'frame', value: frame };

  const connected = new Set();
  links.filter(l => l.frame === frame).forEach(l => {
    connected.add(l.source.id); connected.add(l.target.id);
  });

  link.attr("stroke-opacity", d => d.frame === frame ? 0.6 : 0.02);
  node.select("circle:nth-child(1)")
    .attr("stroke-opacity", n => connected.has(n.id) ? 0.12 : 0.02);
  node.select("circle:nth-child(2)")
    .attr("fill-opacity", n => connected.has(n.id) ? 0.25 : 0.03)
    .attr("stroke-opacity", n => connected.has(n.id) ? 0.6 : 0.08);
}

function reapplyFilter() {
  if (!activeFilter) return;
  const v = activeFilter.value;
  if (activeFilter.type === 'v2') applyV2Filter(v, true);
  else if (activeFilter.type === 'node') applyNodeFilter(v, true);
  else if (activeFilter.type === 'frame') applyFrameFilter(v, true);
}

    ${connections.slice(0, 8).map(l => {

// ─── TICK & DRAG ───

const tooltipState = {
  pinned: false,
  dragging: false,
  expanded: false,
  type: null,
  datum: null,
  x: 0,
  y: 0,
  dragOffsetX: 0,
  dragOffsetY: 0
};
const tooltipPreviewLimit = 8;

function getLinkId(v) {
  return v && typeof v === "object" ? v.id : v;
}

function getNodeConnections(nodeId) {
  return links.filter(l => getLinkId(l.source) === nodeId || getLinkId(l.target) === nodeId);
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function positionTooltip(x, y) {
  const pad = 16;
  const width = tooltip.offsetWidth || 320;
  const height = tooltip.offsetHeight || 120;
  const maxX = Math.max(pad, window.innerWidth - width - pad);
  const maxY = Math.max(pad, window.innerHeight - height - pad);
  const nextX = clamp(x, pad, maxX);
  const nextY = clamp(y, pad, maxY);
  tooltipState.x = nextX;
  tooltipState.y = nextY;
  tooltip.style.left = `${nextX}px`;
  tooltip.style.top = `${nextY}px`;
}

function hideTooltipIfUnpinned() {
  if (tooltipState.pinned) return;
  tooltip.classList.remove("visible", "pinned", "dragging");
  tooltip.innerHTML = "";
  tooltipState.type = null;
  tooltipState.datum = null;
  tooltipState.expanded = false;
}

function unpinTooltip() {
  tooltipState.pinned = false;
  tooltipState.dragging = false;
  hideTooltipIfUnpinned();
}

function renderTooltipHeader(title, color) {
  return `
    <div class="tt-header">
      <div class="tt-header-copy">
        <div class="tt-title" style="color:${color}">${title}</div>
        <div class="tt-meta">${tooltipState.pinned ? 'Pinned panel · drag header to move' : 'Hover preview · click item to pin'}</div>
      </div>
      ${tooltipState.pinned ? '<button class="tt-close-btn" type="button" title="Unpin panel">&times;</button>' : ''}
    </div>
  `;
}

function renderNodeTooltip(d) {
  const connections = getNodeConnections(d.id);
  const selfColor = groupColors[d.group];
  const expanded = tooltipState.expanded;
  const shown = expanded ? connections : connections.slice(0, tooltipPreviewLimit);
  const remaining = Math.max(0, connections.length - shown.length);

  return `
    ${renderTooltipHeader(d.id, selfColor)}
    <div class="tt-row"><span class="tt-key">group</span><span class="tt-val">${d.group}</span></div>
    <div class="tt-row"><span class="tt-key">links</span><span class="tt-val">${connections.length}</span></div>
    <div class="tt-divider"></div>
    <div class="tt-section">
      <div class="tt-section-label">Connected items</div>
      <div class="tt-relations ${expanded ? 'expanded' : ''}">
        ${shown.map(l => {
          const hoveredIsSource = getLinkId(l.source) === d.id;
          const other = hoveredIsSource ? getLinkId(l.target) : getLinkId(l.source);
          return `<div class="tt-connection">
            ${venn2Icon(l.v2, selfColor, hoveredIsSource)}
            <span class="tt-connection-copy">
              <span class="tt-connection-label">${other}</span>
              <span class="tt-connection-sub">${l.frame}</span>
            </span>
          </div>`;
        }).join('')}
      </div>
      ${connections.length > tooltipPreviewLimit ? `<button class="tt-more-btn" type="button">${expanded ? 'Collapse list' : `Show ${remaining} more`}</button>` : ''}
    </div>
  `;
}

function renderLinkTooltip(d) {
  const typeLabel = v2Labels[d.v2].split('\xb7')[1]?.trim() || d.v2;
  return `
    ${renderTooltipHeader(`${d.v2} — ${typeLabel}`, v2Colors[d.v2])}
    <div class="tt-row"><span class="tt-key">from</span><span class="tt-val">${getLinkId(d.source)}</span></div>
    <div class="tt-row"><span class="tt-key">to</span><span class="tt-val">${getLinkId(d.target)}</span></div>
    <div class="tt-row"><span class="tt-key">frame</span><span class="tt-val">${d.frame}</span></div>
    <div class="tt-divider"></div>
    <div class="tt-row"><span class="tt-key">read</span><span class="tt-val">${d.reading}</span></div>
  `;
}

function renderTooltip() {
  if (!tooltipState.type || !tooltipState.datum) return;
  tooltip.classList.toggle("pinned", tooltipState.pinned);
  tooltip.classList.add("visible");
  tooltip.innerHTML = tooltipState.type === "node"
    ? renderNodeTooltip(tooltipState.datum)
    : renderLinkTooltip(tooltipState.datum);
  positionTooltip(tooltipState.x, tooltipState.y);
}

function showTooltipPreview(type, datum, clientX, clientY) {
  if (tooltipState.pinned) return;
  tooltipState.type = type;
  tooltipState.datum = datum;
  tooltipState.expanded = false;
  tooltipState.x = clientX + 16;
  tooltipState.y = clientY - 10;
  renderTooltip();
}

function pinTooltip(type, datum, clientX, clientY) {
  tooltipState.pinned = true;
  tooltipState.dragging = false;
  tooltipState.type = type;
  tooltipState.datum = datum;
  tooltipState.expanded = false;
  tooltipState.x = (clientX ?? tooltipState.x) + 12;
  tooltipState.y = (clientY ?? tooltipState.y) - 10;
  renderTooltip();
}

function updateTooltipPreviewPosition(clientX, clientY) {
  if (tooltipState.pinned || !tooltip.classList.contains("visible")) return;
  positionTooltip(clientX + 16, clientY - 10);
}

function applyNodeHoverState(d, connections) {
  if (activeFilter) return;
  link.attr("stroke-opacity", l =>
    (getLinkId(l.source) === d.id || getLinkId(l.target) === d.id) ? (l.v2 === "UR" ? 0.3 : 0.7) : 0.04
  );
  node.select("circle:nth-child(2)").attr("fill-opacity", n =>
    n.id === d.id || connections.some(l => getLinkId(l.source) === n.id || getLinkId(l.target) === n.id) ? 0.35 : 0.05
  );
}

function clearNodeHoverState() {
  if (activeFilter) return;
  link.attr("stroke-opacity", d => d.v2 === "UR" ? 0.08 : 0.25);
  node.select("circle:nth-child(2)").attr("fill-opacity", 0.15);
}

tooltip.addEventListener("click", (e) => {
  if (e.target.closest(".tt-close-btn")) {
    e.stopPropagation();
    unpinTooltip();
    return;
  }
  if (e.target.closest(".tt-more-btn")) {
    e.stopPropagation();
    tooltipState.expanded = !tooltipState.expanded;
    renderTooltip();
  }
});

tooltip.addEventListener("mousedown", (e) => {
  if (!tooltipState.pinned) return;
  if (!e.target.closest(".tt-header") || e.target.closest(".tt-close-btn")) return;
  const rect = tooltip.getBoundingClientRect();
  tooltipState.dragging = true;
  tooltipState.dragOffsetX = e.clientX - rect.left;
  tooltipState.dragOffsetY = e.clientY - rect.top;
  tooltip.classList.add("dragging");
  e.preventDefault();
});

document.addEventListener("mousemove", (e) => {
  if (!tooltipState.dragging) return;
  positionTooltip(e.clientX - tooltipState.dragOffsetX, e.clientY - tooltipState.dragOffsetY);
});

document.addEventListener("mouseup", () => {
  if (!tooltipState.dragging) return;
  tooltipState.dragging = false;
  tooltip.classList.remove("dragging");
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && tooltipState.pinned) unpinTooltip();
});

window.addEventListener("resize", () => {
  applyResponsiveUI();
  if (tooltip.classList.contains("visible")) positionTooltip(tooltipState.x, tooltipState.y);
  if (searchState.orbitMode) {
    const orbitCenterId = getOrbitCenterId();
    if (orbitCenterId) applyOrbitLayout(orbitCenterId, focusNeighborhoodMaxDepth);
  }
  if (!uiState.userAdjustedZoom || uiState.compact || searchState.orbitMode) {
    scheduleSmartFit(false, searchState.orbitMode, 120);
  }
});

node.on("mouseenter", (e, d) => {
  const connections = getNodeConnections(d.id);
  showTooltipPreview("node", d, e.clientX, e.clientY);
  applyNodeHoverState(d, connections);
})
.on("mousemove", (e) => {
  updateTooltipPreviewPosition(e.clientX, e.clientY);
})
.on("mouseleave", () => {
  hideTooltipIfUnpinned();
  clearNodeHoverState();
})
.on("click", (e, d) => {
  e.stopPropagation();
  applyNodeFilter(d.id);
  pinTooltip("node", d, e.clientX, e.clientY);
});

linkHitArea.on("mouseenter", (e, d) => {
  showTooltipPreview("link", d, e.clientX, e.clientY);
})
.on("mousemove", (e) => {
  updateTooltipPreviewPosition(e.clientX, e.clientY);
})
.on("mouseleave", () => {
  hideTooltipIfUnpinned();
})
.on("click", (e, d) => {
  e.stopPropagation();
  pinTooltip("link", d, e.clientX, e.clientY);
});

simulation.on("tick", () => {
  link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  linkHitArea.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

simulation.on("end.smartFit", () => {
  if (!uiState.hasAutoFitted || uiState.compact || searchState.orbitMode) {
    scheduleSmartFit(false, searchState.orbitMode, 80);
  }
});

function dragstarted(e, d) {
  if (!e.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
function dragended(e, d) {
  if (!e.active) simulation.alphaTarget(0);
  if (searchState.orbitMode && layoutState.orbitCenterId) {
    applyOrbitLayout(layoutState.orbitCenterId, focusNeighborhoodMaxDepth);
    return;
  }
  d.fx = null; d.fy = null;
}

  width = window.innerWidth;

  simulation.force("center", d3.forceCenter(width / 2, height / 2));
  simulation.force("link").distance(getBaseLinkDistance);
